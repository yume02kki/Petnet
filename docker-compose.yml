services:
  backend:
    build: ./backend
    ports:
      - "4445:8000"
    volumes:
      - upload_data:/app/uploads
    environment:
      - TRANSFORMERS_CACHE=/app/.cache
      - HF_HOME=/app/.cache
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    network_mode: host
    depends_on:
      backend:
        condition: service_healthy

volumes:
  upload_data:
